<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Carros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>Cadastre seu veiculo para vender mais rapido</h3>
        </div>
        <div class="form-container">
            <div class="form-header">
                <p>Formulario</p>
            </div>
            <div class="form-body">
                <h1 class="form-title">Venda facil seu carro!</h1>
                <p>Descreva as caracteristicase marque os opicionais que ele possui</p>
                <form>
                    <div class="box-input">
                        <label for="price">
                            Preço<span class="required-field">*</span>
                        </label>
                        <input
                        type="number"
                        name="price"
                        id="price"
                        class="block"
                        placeholder="defina o preço"
                        required
                        />
                    </div>
                       <div class="box-input">
                        <label for="description">
                            Descrição<span class="required-field">*</span>
                        </label>
                       <textarea name="description" id="description" class="block" placeholder="aqui você coloca os detalhes o veiculo(ex:se ele tem algum arranhão)"></textarea>
                    </div>
                       <div class="box-input">
                        <label for="brand">
                            Marca<span class="required-field">*</span>
                        </label>
                        <input
                        type="text"
                        name="brand"
                        id="brand"
                        class="block"
                        placeholder="digite a marca do veiculo"
                        required
                        />
                    </div>
                       <div class="box-input">
                        <label for="model">
                            Modelo<span class="required-field">*</span>
                        </label>
                        <input
                        type="text"
                        name="model"
                        id="model"
                        class="block"
                        placeholder="digite o modelo de seu carro"
                        required
                        />
                    </div>
                       <div class="box-input">
                        <label for="mileage">
                            Kilometragem<span class="required-field">*</span>
                        </label>
                        <input
                        type="number"
                        name="mileage"
                        id="mileage"
                        class="block"
                        placeholder="digite a kilometragem do veiculo"
                        required
                        />
                    </div>
                       <div class="box-input">
                        <label for="purchase_date">
                            Data de compra<span class="required-field">*</span>
                        </label>
                        <input
                        type="date"
                        name="purchase_date"
                        id="purchase_date"
                        class="block"
                        required
                        />
                    </div>
                       <div class="box-input">
                        <p>Tipo de câmbio: <span class="required-field">*</span></p>
                       <input type="radio" id="manual" name="gear">
                       <label for="manual">Manual</label>
                       <input type="radio" id="automatico" name="gear">
                       <label for="automatico">Automatico</label>

                    </div>
                      <div class="optional-box">
                       <p>Opicionais</p>
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="airbag" name="optional[]" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="alarme" name="optional[]" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="ac" name="optional[]" value="ac">
                            <label for="ac">Ar condicionado</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="reverse-cam" name="optional[]" value="reverse-cam">
                            <label for="reverse-cam">Camera de ré</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="lane_assist" name="optional[]" value="lane_assist">
                            <label for="lane_assist">Assistente de pista</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="keyless" name="optional[]" value="keyless">
                            <label for="keyless">Partida keyless</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="smartphone" name="optional[]" value="smartphone">
                            <label for="smartphone">Integração com celular</label>
                        </li>
                       </ul>
                    </div>
                     <div class="optional-box">
                       <ul class="opitional-list">
                        <li>
                            <input type="checkbox" id="lather_seat" name="optional[]" value="lather_seat">
                            <label for="lather_seat">Banco de couro</label>
                        </li>
                       </ul>
                    </div>
                    <div class="box-input">
                        <p>Fotos do carro: <span class="required-field">
                            <input type="file" multiple accept="image/png, image/jpg" id="images" name="images">
                        </span></p>
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit"/>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
